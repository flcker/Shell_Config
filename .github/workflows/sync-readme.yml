name: Sync README to main

on:
  push:
    branches:
      - pwsh
      - zsh
    paths:
      - 'README_*.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check if branch-specific README changed
        id: check
        run: |
          BRANCH="${{ github.ref_name }}"
          git fetch origin "$BRANCH" --depth=2
          if git diff --name-only "origin/${BRANCH}^" "origin/${BRANCH}" | grep -qx "README_${BRANCH}.md"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync README from source branch
        if: steps.check.outputs.changed == 'true'
        run: |
          BRANCH="${{ github.ref_name }}"
          git checkout "origin/$BRANCH" -- "README_${BRANCH}.md"

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          BRANCH="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "README_${BRANCH}.md"
          git diff --cached --quiet || git commit -m "sync: update README_${BRANCH}.md from ${BRANCH} branch"
          git push origin main
